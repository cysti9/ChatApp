<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<h2>Chat</h2>

<div id="login" style="margin-bottom:10px;">
  <input id="usernameInput" type="text" placeholder="Enter your name..." style="width:200px"/>
  <button onclick="joinChat()">Join</button>
</div>

<div id="chatbox" style="display:none;">
  <div id="messages" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px; margin-bottom:10px;"></div>
  <input id="messageInput" type="text" placeholder="Type a message..." style="width:300px"/>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  var stompClient = null;
  var username = null;

  function joinChat() {
      username = document.getElementById('usernameInput').value.trim();
      if (!username) return;

      document.getElementById('login').style.display = 'none';
      document.getElementById('chatbox').style.display = 'block';

      var socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function() {
          stompClient.subscribe('/topic/messages', function(message) {
              var body = JSON.parse(message.body);
              var div = document.createElement('div');
              div.textContent = body.sender + ': ' + body.content;
              document.getElementById('messages').appendChild(div);
          });
      });
  }

  function sendMessage() {
      var input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      stompClient.send("/app/sendMessage", {}, JSON.stringify({
          sender: username,
          content: input.value
      }));
      input.value = '';
  }
</script>
</body>
</html>
