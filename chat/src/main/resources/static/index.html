<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    input { display: block; width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { padding: 8px 16px; cursor: pointer; }
    #error { color: red; font-size: 14px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    .tab { padding: 8px 16px; cursor: pointer; border: none; background: #eee; }
    .tab.active { background: #333; color: white; }
  </style>
</head>
<body>

<!-- Auth Section -->
<div id="authSection">
  <div>
    <button class="tab active" onclick="showTab('login')">Login</button>
    <button class="tab" onclick="showTab('register')">Register</button>
  </div>

  <div id="loginForm" style="margin-top:16px;">
    <h3>Login</h3>
    <input id="loginUsername" type="text" placeholder="Username"/>
    <input id="loginPassword" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>

  <div id="registerForm" style="display:none; margin-top:16px;">
    <h3>Register</h3>
    <input id="regUsername" type="text" placeholder="Username"/>
    <input id="regEmail" type="email" placeholder="Email"/>
    <input id="regPassword" type="password" placeholder="Password"/>
    <button onclick="register()">Register</button>
  </div>

  <p id="error"></p>
</div>

<!-- Chat Section -->
<div id="chatSection" style="display:none;">
  <h3>Welcome, <span id="welcomeUser"></span> <button onclick="logout()" style="float:right;">Logout</button></h3>
  <div id="messages"></div>
  <input id="messageInput" type="text" placeholder="Type a message..."/>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  var stompClient = null;
  var token = null;
  var username = null;

  // ------ TAB SWITCHING ------
  function showTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => {
          t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('error').textContent = '';
  }

  // ------ REGISTER ------
  function register() {
      var body = {
          username: document.getElementById('regUsername').value.trim(),
          email: document.getElementById('regEmail').value.trim(),
          password: document.getElementById('regPassword').value
      };

      fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
      })
      .then(res => res.text())
      .then(msg => {
          if (msg === 'User registered successfully') {
              showTab('login');
              document.getElementById('error').style.color = 'green';
              document.getElementById('error').textContent = 'Registered! Please login.';
          } else {
              showError(msg);
          }
      });
  }

  // ------ LOGIN ------
  function login() {
      var body = {
          username: document.getElementById('loginUsername').value.trim(),
          password: document.getElementById('loginPassword').value
      };

      fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
      })
      .then(res => res.json())
      .then(data => {
          if (data.token) {
              token = data.token;
              username = body.username;
              sessionStorage.setItem('token', token);
              sessionStorage.setItem('username', username);
              openChat();
          } else {
              showError(data);
          }
      });
  }

  // ------ LOGOUT ------
  function logout() {
      token = null;
      username = null;
      sessionStorage.removeItem('token');
      sessionStorage.removeItem('username');
      if (stompClient) stompClient.disconnect();
      document.getElementById('chatSection').style.display = 'none';
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('messages').innerHTML = '';
  }

  // ------ OPEN CHAT ------
  function openChat() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('chatSection').style.display = 'block';
      document.getElementById('welcomeUser').textContent = username;

      loadHistory();
      connectWebSocket();
  }

  // ------ LOAD HISTORY ------
  function loadHistory() {
      fetch('/history', {
          headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(messages => {
          messages.forEach(function(msg) {
              var time = new Date(msg.timestamp)
                  .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              addMessageToUI(msg.sender, msg.content, time);
          });
      });
  }

  // ------ CONNECT WEBSOCKET ------
  function connectWebSocket() {
      var socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);
      stompClient.connect(
          { 'Authorization': 'Bearer ' + token },
          function() {
              stompClient.subscribe('/topic/messages', function(message) {
                  var body = JSON.parse(message.body);
                  addMessageToUI(body.sender, body.content, body.timestamp);
              });
          },
          function(error) {
              showError('Connection failed. Please login again.');
              logout();
          }
      );
  }

  // ------ SEND MESSAGE ------
  function sendMessage() {
      var input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      stompClient.send("/app/sendMessage", {}, JSON.stringify({
          content: input.value
      }));
      input.value = '';
  }

  // ------ UI HELPERS ------
  function addMessageToUI(sender, content, timestamp) {
      var div = document.createElement('div');
      div.textContent = '[' + timestamp + '] ' + sender + ': ' + content;
      document.getElementById('messages').appendChild(div);
      var box = document.getElementById('messages');
      box.scrollTop = box.scrollHeight;
  }

  function showError(msg) {
      document.getElementById('error').style.color = 'red';
      document.getElementById('error').textContent = msg;
  }

  // ------ AUTO LOGIN IF TOKEN EXISTS ------
  window.onload = function() {
      var savedToken = sessionStorage.getItem('token');
      var savedUsername = sessionStorage.getItem('username');
      if (savedToken && savedUsername) {
          token = savedToken;
          username = savedUsername;
          openChat();
      }
  };
</script>
</body>
</html>
